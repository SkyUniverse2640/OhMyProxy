name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  # Build dashboard assets once (shared across platforms)
  build-assets:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      version: ${{ steps.version.outputs.version }}
      exists: ${{ steps.check.outputs.exists }}
      changelog: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Auto version
        id: version
        run: |
          # Get current version
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Analyze commits since last tag for bump type
          LAST_TAG=$(git tag --sort=-v:refname | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges)
          else
            COMMITS=$(git log --oneline --no-merges "${LAST_TAG}..HEAD")
          fi

          # Determine bump: BREAKING/major > feat/minor > fix/patch
          if echo "$COMMITS" | grep -qiE '(BREAKING[ -]CHANGE|feat!|refactor!|fix!|^[a-z]+![:\(])'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^[a-z0-9]+ feat[:\(]'; then
            MINOR=$((MINOR + 1)); PATCH=0; BUMP="minor"
          elif [ -n "$COMMITS" ]; then
            PATCH=$((PATCH + 1)); BUMP="patch"
          else
            echo "No commits to release"; echo "exists=true" >> $GITHUB_OUTPUT; exit 0
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=v${NEXT}" >> $GITHUB_OUTPUT
          echo "bump=${BUMP}" >> $GITHUB_OUTPUT
          echo "Auto version: v${CURRENT} → v${NEXT} (${BUMP})"

      - name: Check if release exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate changelog
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --oneline --no-merges)
          else
            LOG=$(git log --oneline --no-merges "${LAST_TAG}..HEAD")
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Bump version in package.json
        if: steps.check.outputs.exists == 'false'
        run: |
          NEXT_VERSION="${{ steps.version.outputs.version }}"
          NEXT_VERSION="${NEXT_VERSION#v}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${NEXT_VERSION}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${NEXT_VERSION} [skip ci]" || true
          git push origin main || true

      - name: Build dashboard
        if: steps.check.outputs.exists == 'false'
        run: |
          bun install
          bunx tailwindcss -i ./src/dashboard/index.css -o ./src/dashboard/output.css
          bun build ./src/dashboard/app.tsx --outdir=./src/dashboard/dist/ --target browser

      - name: Upload dashboard assets
        if: steps.check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-assets
          path: |
            src/dashboard/index.html
            src/dashboard/output.css
            src/dashboard/dist/app.js
          retention-days: 1

  # Compile binaries for each platform
  compile:
    needs: build-assets
    if: needs.build-assets.outputs.exists == 'false'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary: ohmyproxy
            ext: ''
          - os: windows-latest
            target: windows-x64
            binary: ohmyproxy
            ext: '.exe'
          - os: macos-latest
            target: macos-x64
            binary: ohmyproxy
            ext: ''
          - os: macos-latest
            target: macos-arm64
            binary: ohmyproxy
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Download dashboard assets
        uses: actions/download-artifact@v4
        with:
          name: dashboard-assets
          path: src/dashboard/

      - name: Create dist dir
        shell: bash
        run: mkdir -p src/dashboard/dist 2>/dev/null; true

      - name: Compile binary
        run: |
          bun build --compile --target=bun-${{ matrix.target }} ./index.ts --outfile ${{ matrix.binary }}${{ matrix.ext }}

      - name: Package release
        shell: bash
        run: |
          PLATFORM=${{ matrix.target }}
          BINARY=ohmyproxy${{ matrix.ext }}
          PKG_DIR=ohmyproxy-${PLATFORM}

          mkdir -p ${PKG_DIR}/src/dashboard/dist
          cp ${BINARY} ${PKG_DIR}/
          cp src/dashboard/index.html ${PKG_DIR}/src/dashboard/
          cp src/dashboard/output.css ${PKG_DIR}/src/dashboard/
          cp src/dashboard/dist/app.js ${PKG_DIR}/src/dashboard/dist/
          cp settings.example.json ${PKG_DIR}/settings.json 2>/dev/null || echo '{"proxy":{"port":8020,"host":"127.0.0.1"},"api_keys":["change-me"],"postman":{},"logging":{"enabled":true,"level":"info"}}' > ${PKG_DIR}/settings.json
          echo '[]' > ${PKG_DIR}/list_access_token.json
          echo "OhMyProxy ${PLATFORM}" > ${PKG_DIR}/README.txt
          echo "Run: ./${BINARY}" >> ${PKG_DIR}/README.txt

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ohmyproxy-${PLATFORM}.zip ${PKG_DIR}/
            echo "artifact=ohmyproxy-${PLATFORM}.zip" >> $GITHUB_ENV
          else
            tar czf ohmyproxy-${PLATFORM}.tar.gz ${PKG_DIR}/
            echo "artifact=ohmyproxy-${PLATFORM}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.artifact }}
          retention-days: 1

  # Create release with all binaries
  release:
    needs: [build-assets, compile]
    if: needs.build-assets.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in */; do
            for file in "$dir"*; do
              [ -f "$file" ] && sha256sum "$file" >> checksums.txt
            done
          done
          # Shorten paths: artifacts/linux-x64/ohmyproxy-linux-x64.tar.gz → ohmyproxy-linux-x64.tar.gz
          sed -i 's|artifacts/[^/]*/||g' checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-assets.outputs.version }}
          name: Release ${{ needs.build-assets.outputs.version }}
          body: |
            ## Changes
            ```
            ${{ needs.build-assets.outputs.changelog }}
            ```

            ## Download

            | Platform | File |
            |----------|------|
            | Linux x64 | `ohmyproxy-linux-x64.tar.gz` |
            | Windows x64 | `ohmyproxy-windows-x64.zip` |
            | macOS x64 | `ohmyproxy-macos-x64.tar.gz` |
            | macOS ARM64 | `ohmyproxy-macos-arm64.tar.gz` |
            | **Checksums** | `checksums.txt` |

            ## Quick Start
            1. Download for your platform
            2. Extract: `tar xzf ohmyproxy-<platform>.tar.gz` or unzip
            3. Edit `settings.json` with your API keys
            4. Run: `./ohmyproxy`
            5. Open http://127.0.0.1:8020/

            ## From Source
            ```bash
            git clone https://github.com/SkyUniverse2640/OhMyProxy.git
            cd OhMyProxy && git checkout ${{ needs.build-assets.outputs.version }}
            bun install && bun run build:css
            bun build ./src/dashboard/app.tsx --outdir=./src/dashboard/dist/ --target browser
            bun run index.ts
            ```
          files: |
            artifacts/linux-x64/ohmyproxy-linux-x64.tar.gz
            artifacts/windows-x64/ohmyproxy-windows-x64.zip
            artifacts/macos-x64/ohmyproxy-macos-x64.tar.gz
            artifacts/macos-arm64/ohmyproxy-macos-arm64.tar.gz
            artifacts/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
