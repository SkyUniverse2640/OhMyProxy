name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  # Version, changelog, bump, build dashboard assets
  prepare:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Auto version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          LAST_TAG=$(git tag --sort=-v:refname | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges)
          else
            COMMITS=$(git log --oneline --no-merges "${LAST_TAG}..HEAD")
          fi
          if echo "$COMMITS" | grep -qiE '(BREAKING[ -]CHANGE|feat!|refactor!|fix!|^[a-z]+![:\(])'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^[a-z0-9]+ feat[:\(]'; then
            MINOR=$((MINOR + 1)); PATCH=0; BUMP="minor"
          elif [ -n "$COMMITS" ]; then
            PATCH=$((PATCH + 1)); BUMP="patch"
          else
            echo "No commits"; echo "skip=true" >> $GITHUB_OUTPUT; exit 0
          fi
          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=v${NEXT}" >> $GITHUB_OUTPUT
          echo "Auto version: v${CURRENT} → v${NEXT} (${BUMP})"

      - name: Check release exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "Release already exists, skipping"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --oneline --no-merges)
          else
            LOG=$(git log --oneline --no-merges "${LAST_TAG}..HEAD")
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Bump version
        run: |
          V="${{ steps.version.outputs.version }}"; V="${V#v}"
          node -e "const p=require('./package.json');p.version='${V}';require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump to ${V} [skip ci]" || true
          git push origin main || true

      - name: Build dashboard
        run: |
          bun install
          bunx tailwindcss -i ./src/dashboard/index.css -o ./src/dashboard/output.css
          bun build ./src/dashboard/app.tsx --outdir=./src/dashboard/dist/ --target browser

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: |
            src/dashboard/index.html
            src/dashboard/output.css
            src/dashboard/dist/app.js
          retention-days: 1

  # Compile on native OS (cross-compile within same OS family for arch variants)
  compile:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: "bun-linux-x64|linux_amd64|,bun-linux-arm64|linux_aarch64|"
          - os: macos-latest
            targets: "bun-darwin-arm64|darwin_aarch64|,bun-darwin-x64|darwin_amd64|"
          - os: windows-latest
            targets: "bun-windows-x64|windows_amd64|.exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Embed version
        run: |
          V="${{ needs.prepare.outputs.version }}"
          echo "export const VERSION = \"${V#v}\";" > src/version.ts

      - name: Download dashboard
        uses: actions/download-artifact@v4
        with:
          name: dashboard
          path: src/dashboard/

      - name: Create dist dir
        shell: bash
        run: mkdir -p src/dashboard/dist 2>/dev/null; true

      - name: Compile & package
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION="${VERSION#v}"
          IFS=',' read -ra TARGETS <<< "${{ matrix.targets }}"

          mkdir -p dist

          for entry in "${TARGETS[@]}"; do
            [ -z "$entry" ] && continue
            IFS='|' read -r BUN_TARGET PLATFORM EXT <<< "$entry"
            BINARY="ohmyproxy${EXT}"
            NAME="OhMyProxy_${VERSION}_${PLATFORM}"
            PKG_DIR="${NAME}"

            echo "::group::Compiling ${PLATFORM}"
            bun build --compile --target=${BUN_TARGET} ./index.ts --outfile ${BINARY}
            echo "::endgroup::"

            echo "::group::Packaging ${PLATFORM}"
            mkdir -p ${PKG_DIR}/src/dashboard/dist
            cp ${BINARY} ${PKG_DIR}/
            cp src/dashboard/index.html ${PKG_DIR}/src/dashboard/
            cp src/dashboard/output.css ${PKG_DIR}/src/dashboard/
            cp src/dashboard/dist/app.js ${PKG_DIR}/src/dashboard/dist/
            cp settings.example.json ${PKG_DIR}/settings.json 2>/dev/null || echo '{"proxy":{"port":8020,"host":"127.0.0.1"},"api_keys":["change-me"],"postman":{},"logging":{"enabled":true,"level":"info"}}' > ${PKG_DIR}/settings.json
            echo '[]' > ${PKG_DIR}/list_access_token.json
            echo "OhMyProxy v${VERSION} - ${PLATFORM}" > ${PKG_DIR}/README.txt
            echo "Run: ./${BINARY}" >> ${PKG_DIR}/README.txt

            if [[ "${PLATFORM}" == windows_* ]]; then
              7z a ${NAME}.zip ${PKG_DIR}/ >/dev/null
              ARTIFACT="${NAME}.zip"
            else
              tar czf ${NAME}.tar.gz ${PKG_DIR}/
              ARTIFACT="${NAME}.tar.gz"
            fi

            mkdir -p dist/${PLATFORM}
            mv ${ARTIFACT} dist/${PLATFORM}/
            rm -rf ${PKG_DIR} ${BINARY}
            echo "::endgroup::"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.os }}
          path: dist/
          retention-days: 1

  # Create release with all binaries + checksums
  release:
    needs: [prepare, compile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bins-*
          path: dist/
          merge-multiple: true

      - name: List & checksums
        run: |
          find dist/ -type f -ls
          cd dist
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; \
            | sed 's|^\./||;s|^[^/]*/||' \
            | sort > checksums.txt
          mv checksums.txt dist/checksums.txt 2>/dev/null || true
          cat checksums.txt 2>/dev/null || cat dist/checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: |
            ## Changes
            ```
            ${{ needs.prepare.outputs.changelog }}
            ```

            ## Download

            | Platform | File |
            |----------|------|
            | Linux x64 | `OhMyProxy_${{ needs.prepare.outputs.version }}_linux_amd64.tar.gz` |
            | Linux ARM64 | `OhMyProxy_${{ needs.prepare.outputs.version }}_linux_aarch64.tar.gz` |
            | macOS x64 | `OhMyProxy_${{ needs.prepare.outputs.version }}_darwin_amd64.tar.gz` |
            | macOS ARM64 | `OhMyProxy_${{ needs.prepare.outputs.version }}_darwin_aarch64.tar.gz` |
            | Windows x64 | `OhMyProxy_${{ needs.prepare.outputs.version }}_windows_amd64.zip` |
            | **Checksums** | `checksums.txt` |

            ## Quick Start
            1. Download for your platform
            2. Extract: `tar xzf OhMyProxy_*.tar.gz` or unzip
            3. Edit `settings.json` with your API keys
            4. Run: `./ohmyproxy` (or `ohmyproxy.exe` on Windows)
            5. Open http://127.0.0.1:8020/

            ## From Source
            ```bash
            git clone https://github.com/SkyUniverse2640/OhMyProxy.git
            cd OhMyProxy && git checkout ${{ needs.prepare.outputs.version }}
            bun install && bun run build:css
            bun build ./src/dashboard/app.tsx --outdir=./src/dashboard/dist/ --target browser
            bun run index.ts
            ```
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
