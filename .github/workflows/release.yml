name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      # ─── Version & Changelog ──────────────────────────────────────────

      - name: Auto version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          LAST_TAG=$(git tag --sort=-v:refname | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges)
          else
            COMMITS=$(git log --oneline --no-merges "${LAST_TAG}..HEAD")
          fi
          if echo "$COMMITS" | grep -qiE '(BREAKING[ -]CHANGE|feat!|refactor!|fix!|^[a-z]+![:\(])'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0; BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^[a-z0-9]+ feat[:\(]'; then
            MINOR=$((MINOR + 1)); PATCH=0; BUMP="minor"
          elif [ -n "$COMMITS" ]; then
            PATCH=$((PATCH + 1)); BUMP="patch"
          else
            echo "No commits to release"; echo "skip=true" >> $GITHUB_OUTPUT; exit 0
          fi
          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=v${NEXT}" >> $GITHUB_OUTPUT
          echo "bump=${BUMP}" >> $GITHUB_OUTPUT
          echo "Auto version: v${CURRENT} → v${NEXT} (${BUMP})"

      - name: Check if release exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "skip compiling, release already exists"
            exit 0
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --oneline --no-merges)
          else
            LOG=$(git log --oneline --no-merges "${LAST_TAG}..HEAD")
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Bump version in package.json
        run: |
          NEXT_VERSION="${{ steps.version.outputs.version }}"
          NEXT_VERSION="${NEXT_VERSION#v}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${NEXT_VERSION}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${NEXT_VERSION} [skip ci]" || true
          git push origin main || true

      # ─── Build Dashboard ──────────────────────────────────────────────

      - name: Build dashboard
        run: |
          bun install
          bunx tailwindcss -i ./src/dashboard/index.css -o ./src/dashboard/output.css
          bun build ./src/dashboard/app.tsx --outdir=./src/dashboard/dist/ --target browser

      # ─── Compile All Platforms (Bun cross-compiles from x64) ──────────

      - name: Compile & package all platforms
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"

          # Define targets: bun-target|platform|ext
          TARGETS=(
            "bun-linux-x64|linux_amd64|"
            "bun-linux-arm64|linux_aarch64|"
            "bun-windows-x64|windows_amd64|.exe"
            "bun-darwin-x64|darwin_amd64|"
            "bun-darwin-arm64|darwin_aarch64|"
          )

          mkdir -p dist

          for entry in "${TARGETS[@]}"; do
            IFS='|' read -r BUN_TARGET PLATFORM EXT <<< "$entry"
            BINARY="ohmyproxy${EXT}"
            NAME="OhMyProxy_${VERSION}_${PLATFORM}"
            PKG_DIR="${NAME}"

            echo "::group::Compiling ${PLATFORM}"
            bun build --compile --target=${BUN_TARGET} ./index.ts --outfile ${BINARY}
            echo "::endgroup::"

            echo "::group::Packaging ${PLATFORM}"
            mkdir -p ${PKG_DIR}/src/dashboard/dist
            cp ${BINARY} ${PKG_DIR}/
            cp src/dashboard/index.html ${PKG_DIR}/src/dashboard/
            cp src/dashboard/output.css ${PKG_DIR}/src/dashboard/
            cp src/dashboard/dist/app.js ${PKG_DIR}/src/dashboard/dist/
            cp settings.example.json ${PKG_DIR}/settings.json 2>/dev/null || echo '{"proxy":{"port":8020,"host":"127.0.0.1"},"api_keys":["change-me"],"postman":{},"logging":{"enabled":true,"level":"info"}}' > ${PKG_DIR}/settings.json
            echo '[]' > ${PKG_DIR}/list_access_token.json
            echo "OhMyProxy v${VERSION} - ${PLATFORM}" > ${PKG_DIR}/README.txt
            echo "Run: ./${BINARY}" >> ${PKG_DIR}/README.txt

            if [[ "${PLATFORM}" == windows_* ]]; then
              sudo apt-get install -y p7zip-full 2>/dev/null || true
              7z a ${NAME}.zip ${PKG_DIR}/
              ARTIFACT="${NAME}.zip"
            else
              tar czf ${NAME}.tar.gz ${PKG_DIR}/
              ARTIFACT="${NAME}.tar.gz"
            fi

            mkdir -p dist/${PLATFORM}
            mv ${ARTIFACT} dist/${PLATFORM}/
            # Cleanup for next platform
            rm -rf ${PKG_DIR} ${BINARY}
            echo "::endgroup::"
          done

          # Generate checksums
          cd dist
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; \
            | sed 's|^\./||' \
            | sed 's|^[^/]*/||' \
            | sort > checksums.txt
          cat checksums.txt
          cd ..

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: dist/

      # ─── Create GitHub Release ────────────────────────────────────────

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Changes
            ```
            ${{ steps.changelog.outputs.body }}
            ```

            ## Download

            | Platform | File |
            |----------|------|
            | Linux x64 | `OhMyProxy_${{ steps.version.outputs.version }}_linux_amd64.tar.gz` |
            | Linux ARM64 | `OhMyProxy_${{ steps.version.outputs.version }}_linux_aarch64.tar.gz` |
            | macOS x64 | `OhMyProxy_${{ steps.version.outputs.version }}_darwin_amd64.tar.gz` |
            | macOS ARM64 | `OhMyProxy_${{ steps.version.outputs.version }}_darwin_aarch64.tar.gz` |
            | Windows x64 | `OhMyProxy_${{ steps.version.outputs.version }}_windows_amd64.zip` |
            | **Checksums** | `checksums.txt` |

            ## Quick Start
            1. Download for your platform
            2. Extract: `tar xzf OhMyProxy_*.tar.gz` or unzip
            3. Edit `settings.json` with your API keys
            4. Run: `./ohmyproxy` (or `ohmyproxy.exe` on Windows)
            5. Open http://127.0.0.1:8020/

            ## From Source
            ```bash
            git clone https://github.com/SkyUniverse2640/OhMyProxy.git
            cd OhMyProxy && git checkout ${{ steps.version.outputs.version }}
            bun install && bun run build:css
            bun build ./src/dashboard/app.tsx --outdir=./src/dashboard/dist/ --target browser
            bun run index.ts
            ```
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
